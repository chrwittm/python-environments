# sap-ai-genai.yml
# -------------------------------------------------------------------
# Environment for SAP Generative AI Hub SDK
# -------------------------------------------------------------------

name: sap-gen-ai

channels:
  - conda-forge     # primary open-source channel with Apple Silicon builds

dependencies:
  # --- Core tools on conda-forge channel ---
  - python=3.12
  - ipython
  - jupyterlab
  - ipywidgets
  - numpy
  - pandas
  - matplotlib

  # --- Pip dependencies ---
  - pip
  - pip:
      - "sap-ai-sdk-gen[all]"